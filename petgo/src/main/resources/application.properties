server.port=8080

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Database Configuration (?„ s?a l?i cho kh?p v?i Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/petgo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# NÍn thÍm dialect ?? Hibernate ho?t ??ng chu?n nh?t v?i MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Settings
petgo.app.jwtSecret=PetGoSecretKeyForNghia2026SecureProjectApplication
petgo.app.jwtExpirationMs=86400000

# File Upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
