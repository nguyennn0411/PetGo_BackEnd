server:
  port: ${PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  homepage:
    featured-limit: 3
    nearby-limit: 6
    review-limit: 6
    membership-limit: 3

  providers:
    slot-lookahead-days: 7
    card-slot-limit: 3
    detail-slot-limit: 6
    detail-review-limit: 8

  pets:
    max-photo-limit: 5

  bookings:
    timezone: Asia/Ho_Chi_Minh

  booking-management:
    reschedule-lookahead-days: 14

  auth:
    access-token-expiration-minutes: 120
    refresh-token-expiration-days: 30
    issuer: petgo-backend
    jwt-secret: ${JWT_SECRET}

  upload:
    root-dir: uploads
    pet-avatar-dir: uploads/pets
    pet-avatar-public-path: /uploads/pets

  payos:
    client-id: ${PAYOS_CLIENT_ID}
    api-key: ${PAYOS_API_KEY}
    checksum-key: ${PAYOS_CHECKSUM_KEY}
    return-url: ${PAYOS_RETURN_URL:https://petgo.website/payment/success}
    cancel-url: ${PAYOS_CANCEL_URL:https://petgo.website/payment/cancel}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-3.5-flash